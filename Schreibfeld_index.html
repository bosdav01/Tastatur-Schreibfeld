<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitales Schreibfeld · Lektion 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300..900;1,300..900&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@300..600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #F2EDE0;
      --bg-paper: #F8F4E9;
      --bg-paper-elevated: #FBF8EF;
      --ink-primary: #2C2A26;
      --ink-secondary: #5C5850;
      --ink-tertiary: #8A8478;
      --rule: #DDD3BD;
      --rule-soft: #E8DFC9;
      --accent: #7A2E1F;
      --accent-soft: #B85540;
      --moss: #4A5D3C;
      --shadow: 0 1px 0 rgba(44, 42, 38, 0.04), 0 8px 24px -12px rgba(44, 42, 38, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg-page);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(184, 85, 64, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(74, 93, 60, 0.04) 0%, transparent 40%);
      color: var(--ink-primary);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 32px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      background: var(--bg-paper);
      border: 1px solid var(--rule);
      box-shadow: var(--shadow);
      padding: 64px 72px 56px;
      position: relative;
    }

    .page::before, .page::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      border: 1px solid var(--rule);
    }
    .page::before {
      top: 16px; left: 16px;
      border-right: none; border-bottom: none;
    }
    .page::after {
      bottom: 16px; right: 16px;
      border-left: none; border-top: none;
    }

    header {
      border-bottom: 1px solid var(--rule);
      padding-bottom: 32px;
      margin-bottom: 40px;
    }

    h1 {
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 500;
      font-size: 42px;
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--ink-primary);
      margin-bottom: 10px;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
    }

    /* Eingabefeld */
    .writing-area {
      width: 100%;
      min-height: 360px;
      background: var(--bg-paper-elevated);
      border: 1px solid var(--rule);
      padding: 36px 40px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 18px;
      line-height: 2;
      color: var(--ink-primary);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
      background-image: linear-gradient(transparent calc(2em - 1px), var(--rule-soft) calc(2em - 1px), var(--rule-soft) 2em, transparent 2em);
      background-size: 100% 2em;
      background-attachment: local;
      margin-bottom: 28px;
    }

    .writing-area::placeholder {
      color: var(--ink-tertiary);
      font-style: italic;
      font-family: 'Crimson Pro', serif;
    }

    .writing-area:focus {
      border-color: var(--ink-secondary);
      background: #FFFCF4;
    }

    .writing-area.locked {
      opacity: 0.65;
      cursor: not-allowed;
      background: var(--bg-paper);
    }

    /* Statusleiste */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      border-top: 1px solid var(--rule-soft);
      border-bottom: 1px solid var(--rule-soft);
      gap: 16px;
      flex-wrap: wrap;
    }

    .status-metrics {
      display: flex;
      gap: 40px;
      font-family: 'DM Sans', sans-serif;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .metric-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
    }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--ink-primary);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 11px 24px;
      border: 1px solid var(--ink-primary);
      background: transparent;
      color: var(--ink-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: var(--ink-primary);
      color: var(--bg-paper);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-paper);
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-soft);
      border-color: var(--accent-soft);
    }

    .btn-stop {
      background: var(--moss);
      color: var(--bg-paper);
      border-color: var(--moss);
    }
    .btn-stop:hover {
      background: #5b7049;
      border-color: #5b7049;
    }

    .btn-ghost {
      border-color: var(--rule);
      color: var(--ink-secondary);
    }
    .btn-ghost:hover {
      background: var(--bg-paper-elevated);
      color: var(--ink-primary);
      border-color: var(--ink-secondary);
    }

    /* Auswertung – erscheint erst nach «Beenden» */
    .summary-card {
      display: none;
      background: var(--bg-paper-elevated);
      border: 1px solid var(--rule);
      padding: 36px 40px;
      margin-top: 32px;
    }
    .summary-card.visible { display: block; }

    .summary-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .summary-title {
      font-family: 'Crimson Pro', serif;
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 28px;
      color: var(--ink-primary);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 24px 0;
      border-top: 1px solid var(--rule-soft);
      border-bottom: 1px solid var(--rule-soft);
      margin-bottom: 22px;
    }

    .summary-item { text-align: center; }

    .summary-value {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 40px;
      color: var(--ink-primary);
      line-height: 1;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .summary-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
    }

    .summary-note {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--ink-secondary);
      text-align: center;
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--rule-soft);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-tertiary);
      text-align: center;
    }

    @media (max-width: 720px) {
      body { padding: 16px 8px; }
      .page { padding: 36px 28px; }
      .page::before, .page::after { width: 16px; height: 16px; }
      h1 { font-size: 32px; }
      .writing-area { padding: 24px 24px; min-height: 280px; }
      .summary-grid { grid-template-columns: 1fr; gap: 18px; }
      .status-bar { flex-direction: column; align-items: stretch; }
      .status-metrics { justify-content: center; }
      .controls { justify-content: stretch; }
      .controls .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Digitales Schreibfeld</h1>
      <div class="subtitle">Lektion 1 · Übungsphase</div>
    </header>

    <textarea
      id="writingArea"
      class="writing-area"
      placeholder="Übungen aus dem Kursheft hier eingeben. Drücke «Übung starten», um Anschläge und Zeit aufzuzeichnen."
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    ></textarea>

    <div class="status-bar">
      <div class="status-metrics">
        <div class="metric">
          <div class="metric-label">Anschläge</div>
          <div class="metric-value" id="strokeCount">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Zeit</div>
          <div class="metric-value" id="timer">0:00</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-ghost" id="resetBtn">Zurücksetzen</button>
        <button class="btn btn-primary" id="startBtn">Übung starten</button>
      </div>
    </div>

    <div class="summary-card" id="summary">
      <div class="summary-eyebrow">Übung abgeschlossen</div>
      <div class="summary-title">Zusammenfassung</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-value" id="sumStrokes">0</div>
          <div class="summary-label">Anschläge</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="sumDuration">0:00</div>
          <div class="summary-label">Dauer</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="sumPace">0</div>
          <div class="summary-label">Anschläge / Min.</div>
        </div>
      </div>
      <p class="summary-note">Die Auswertung dient deiner persönlichen Orientierung.</p>
    </div>

    <footer>
      Bachelorarbeit · David Bossard · ZHAW SML
    </footer>
  </main>

  <script>
    const writingArea = document.getElementById('writingArea');
    const strokeCountEl = document.getElementById('strokeCount');
    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const summary = document.getElementById('summary');
    const sumStrokes = document.getElementById('sumStrokes');
    const sumDuration = document.getElementById('sumDuration');
    const sumPace = document.getElementById('sumPace');

    let state = {
      running: false,
      startedAt: null,
      strokes: 0,
      timerInterval: null
    };

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function setStartButton(mode) {
      startBtn.classList.remove('btn-primary', 'btn-stop');
      if (mode === 'start') {
        startBtn.textContent = 'Übung starten';
        startBtn.classList.add('btn-primary');
      } else if (mode === 'stop') {
        startBtn.textContent = 'Übung beenden';
        startBtn.classList.add('btn-stop');
      } else if (mode === 'new') {
        startBtn.textContent = 'Neue Übung';
        startBtn.classList.add('btn-primary');
      }
    }

    startBtn.addEventListener('click', () => {
      if (!state.running) {
        startSession();
      } else {
        endSession();
      }
    });

    function startSession() {
      state.running = true;
      state.startedAt = Date.now();
      state.strokes = 0;
      writingArea.value = '';
      writingArea.classList.remove('locked');
      writingArea.focus();
      strokeCountEl.textContent = '0';
      timerEl.textContent = '0:00';
      summary.classList.remove('visible');
      setStartButton('stop');

      state.timerInterval = setInterval(() => {
        const elapsed = Date.now() - state.startedAt;
        timerEl.textContent = formatTime(elapsed);
      }, 250);
    }

    function endSession() {
      if (!state.running) return;
      const elapsed = Date.now() - state.startedAt;
      state.running = false;
      clearInterval(state.timerInterval);

      const elapsedMin = elapsed / 60000;
      const pace = elapsedMin > 0 ? Math.round(state.strokes / elapsedMin) : 0;

      sumStrokes.textContent = state.strokes;
      sumDuration.textContent = formatTime(elapsed);
      sumPace.textContent = pace;
      summary.classList.add('visible');

      writingArea.classList.add('locked');
      writingArea.blur();

      setStartButton('new');
    }

    function stopAndReset() {
      state.running = false;
      clearInterval(state.timerInterval);
      state.strokes = 0;
      state.startedAt = null;
      writingArea.value = '';
      writingArea.classList.remove('locked');
      strokeCountEl.textContent = '0';
      timerEl.textContent = '0:00';
      summary.classList.remove('visible');
      setStartButton('start');
    }

    resetBtn.addEventListener('click', () => {
      if (state.strokes === 0 && !state.running && !writingArea.value) return;
      if (confirm('Übung zurücksetzen?')) {
        stopAndReset();
        writingArea.focus();
      }
    });

    // Anschlagszählung – passiv und neutral, kein Werturteil über Korrektheit
    writingArea.addEventListener('keydown', (e) => {
      if (state.running && e.key.length === 1) {
        state.strokes++;
        strokeCountEl.textContent = state.strokes;
      }
    });
  </script>
</body>
</html>
